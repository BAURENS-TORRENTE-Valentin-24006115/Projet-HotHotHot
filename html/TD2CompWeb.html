<head>
    <link rel="stylesheet" href="../css/TD2CompWeb.css">
    <title>Capteur</title>
</head>
<body>
    <h1>Température</h1>
    <div class="tabs">
        <div role="tablist" aria-labelledby="tablist-1" class="manual">
            <button id="tab-1" type="button" role="tab" aria-selected="true" aria-controls="tabpanel-1">
                <span class="focus">Actuelle</span>
            </button>
            <button id="tab-2" type="button" role="tab" aria-selected="false" aria-controls="tabpanel-2" tabindex="-1">
                <span class="focus">Historique</span>
            </button>
        </div>

        <div id="tabpanel-1" role="tabpanel" aria-labelledby="tab-1">
            <section>
                <p id="value" aria-live="assertive"></p>
                <p id="message" role="alert"></p>
            </section>
        </div>
        <div id="tabpanel-2" role="tabpanel" aria-labelledby="tab-2" class="is-hidden">

        </div>
    </div>

    <script src="../js/Temperature.js"></script>
    <script src="../js/Display.js"></script>
    <script src="../js/History.js"></script>
    <script src="../js/Alert.js"></script>
    <script src="../js/Main.js" ></script>
    <script src="../js/TabsManual.js" ></script>
</body>
